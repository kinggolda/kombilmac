name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      schedule_source_url:
        description: Schedule source URL for SCHEDULE_SOURCE_URL dart-define
        required: false
        default: https://docs.google.com/spreadsheets/d/PUT_SPREADSHEET_ID_HERE/edit?gid=0

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --dart-define=SCHEDULE_SOURCE_URL="${{ github.event.inputs.schedule_source_url }}"

      - name: Pack unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          /usr/bin/zip -r Runner-unsigned.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/ipa/Runner-unsigned.ipa
